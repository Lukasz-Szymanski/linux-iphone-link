<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux iPhone Link</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>iPhone Link</h1>
            <div class="status-indicator" id="statusBadge">
                <div class="status-dot"></div>
                Połączono
            </div>
        </div>
        
        <button class="new-msg-btn" onclick="startNewMessage()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
            </svg>
            Nowa wiadomość
        </button>

        <div class="inbox-list" id="inboxList">
            <div style="padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px;">
                <div class="status-dot" style="margin: 0 auto 10px auto; width: 8px; height: 8px;"></div>
                Pobieranie wiadomości z iPhone'a...
            </div>
        </div>
    </aside>

    <!-- Chat Area -->
    <main class="chat-area">
        
        <!-- Header: Conversation info or New Message Input -->
        <div class="chat-header hidden" id="chatHeader">
            <div class="chat-header-info">
                <h2 id="chatHeaderName">Kontakt</h2>
                <p id="chatHeaderSub">iMessage / SMS</p>
            </div>
        </div>

        <div class="chat-header hidden" id="newMsgHeader" style="padding: 16px 24px;">
            <div style="display: flex; align-items: center; gap: 12px; width: 100%;">
                <span style="color: var(--text-muted); font-weight: 500;">Do:</span>
                <input type="text" id="newMsgNumber" class="compose-input" style="padding: 0; background: transparent; border: none; font-size: 16px;" placeholder="Wpisz numer telefonu...">
            </div>
        </div>

        <!-- Chat History -->
        <div class="chat-history" id="chatHistory">
            <div class="empty-state" id="emptyState">
                <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
                </svg>
                <h3>Twój iPhone na Linuksie</h3>
                <p style="font-size: 13px; max-width: 250px; margin: 0 auto;">Wybierz konwersację z paska bocznego lub rozpocznij nową, aby wysłać SMS.</p>
            </div>
        </div>
        
        <!-- Compose Area -->
        <div class="compose-area">
            <div class="compose-input-wrapper">
                <input type="text" class="compose-input" id="messageInput" placeholder="Napisz iMessage (beta)..." disabled autocomplete="off">
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-left: -2px; margin-top: 2px;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </main>

    <script>
        let currentActiveNumber = null;
        
        // Listen for Enter key to send
        document.getElementById("messageInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById("sendBtn").click();
            }
        });

        async function fetchMessages() {
            try {
                const response = await fetch('/api/messages');
                const data = await response.json();
                
                const inboxList = document.getElementById('inboxList');
                inboxList.innerHTML = '';
                
                if (data.error) {
                    document.getElementById('statusBadge').innerHTML = "Błąd Połączenia";
                    document.getElementById('statusBadge').style.background = "rgba(244, 63, 94, 0.1)";
                    document.getElementById('statusBadge').style.color = "var(--accent-warm)";
                    document.getElementById('statusBadge').style.borderColor = "rgba(244, 63, 94, 0.2)";
                    
                    inboxList.innerHTML = `<div style="padding: 24px; color: var(--accent-warm); font-size: 13px; text-align: center;">${data.error}</div>`;
                    return;
                }

                data.messages.forEach((msg, index) => {
                    const item = document.createElement('div');
                    item.className = 'message-item';
                    item.style.animationDelay = `${index * 0.05}s`;
                    item.style.animation = 'popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                    item.style.opacity = '0';
                    
                    const senderDisplay = msg.sender_name || msg.sender;
                    const date = msg.timestamp ? msg.timestamp.substring(4, 16) : '';
                    
                    item.innerHTML = `
                        <div class="message-header">
                            <span class="message-sender">${senderDisplay}</span>
                            <span class="message-time">${date}</span>
                        </div>
                        <div class="message-subject">${msg.subject}</div>
                    `;
                    
                    item.onclick = () => {
                        document.querySelectorAll('.message-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        selectConversation(senderDisplay, msg.sender, msg.subject);
                    };
                    inboxList.appendChild(item);
                });
                
            } catch (error) {
                console.error("Error fetching messages:", error);
            }
        }
        
        function selectConversation(senderDisplay, rawNumber, subject) {
            currentActiveNumber = rawNumber;
            
            document.getElementById('newMsgHeader').classList.add('hidden');
            document.getElementById('chatHeader').classList.remove('hidden');
            document.getElementById('chatHeaderName').innerText = senderDisplay;
            
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML = '';
            
            // Render received message bubble
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble received';
            bubble.innerText = subject;
            chatHistory.appendChild(bubble);
            
            enableCompose();
        }
        
        function startNewMessage() {
            currentActiveNumber = null;
            
            document.querySelectorAll('.message-item').forEach(el => el.classList.remove('active'));
            document.getElementById('chatHeader').classList.add('hidden');
            document.getElementById('newMsgHeader').classList.remove('hidden');
            document.getElementById('newMsgNumber').value = '';
            
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML = `
                <div class="empty-state" style="margin-top: 40px;">
                    <p style="font-size: 14px;">Zacznij nową konwersację wpisując numer na górze.</p>
                </div>`;
            
            enableCompose();
            document.getElementById('newMsgNumber').focus();
        }
        
        function enableCompose() {
            const input = document.getElementById('messageInput');
            input.disabled = false;
            document.getElementById('sendBtn').disabled = false;
            input.placeholder = "Wiadomość...";
            input.focus();
        }

        async function sendMessage() {
            let targetNumber = currentActiveNumber;
            
            if (!document.getElementById('newMsgHeader').classList.contains('hidden')) {
                targetNumber = document.getElementById('newMsgNumber').value.trim();
                if (!targetNumber) {
                    alert("Wpisz numer telefonu!");
                    return;
                }
            }
            
            if (!targetNumber) return;
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const chatHistory = document.getElementById('chatHistory');
            const emptyState = chatHistory.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            // Add sent bubble
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble sent';
            bubble.innerText = text;
            chatHistory.appendChild(bubble);
            
            input.value = '';
            input.disabled = true;
            document.getElementById('sendBtn').disabled = true;
            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: targetNumber, text: text })
                });
                
                const result = await response.json();
                
                input.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
                
                if (result.error) {
                    const errorBubble = document.createElement('div');
                    errorBubble.className = 'chat-bubble error';
                    errorBubble.innerText = `Błąd: ${result.error}`;
                    chatHistory.appendChild(errorBubble);
                } else {
                    if (!document.getElementById('newMsgHeader').classList.contains('hidden')) {
                        // Switch from new msg to standard chat view
                        currentActiveNumber = targetNumber;
                        document.getElementById('newMsgHeader').classList.add('hidden');
                        document.getElementById('chatHeader').classList.remove('hidden');
                        document.getElementById('chatHeaderName').innerText = targetNumber;
                    }
                }
            } catch (err) {
                input.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                console.error(err);
            }
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // Initialize
        fetchMessages();
    </script>
</body>
</html>
