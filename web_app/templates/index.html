<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux iPhone Link</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>iPhone Link</h1>
            <div class="status-indicator" id="statusBadge">
                <div class="status-dot"></div>
                Połączono
            </div>
        </div>
        
        <div class="sidebar-search">
            <div class="search-wrapper">
                <svg width="14" height="14" fill="none" stroke="var(--text-muted)" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Szukaj..." autocomplete="off">
            </div>
        </div>
        
        <div style="display: flex; gap: 8px; margin: 0 16px 16px 16px;">
            <button class="new-msg-btn" style="flex: 1; margin: 0;" onclick="startNewMessage()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                </svg>
                Nowa wiadomość
            </button>
            <button class="new-msg-btn" style="margin: 0; padding: 12px; aspect-ratio: 1/1; display: flex; justify-content: center; align-items: center;" onclick="fetchMessages()" title="Odśwież skrzynkę">
                <svg id="refreshIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </button>
        </div>

        <div class="inbox-list" id="inboxList">
            <div class="skeleton-item"><div class="skeleton-avatar"></div><div class="skeleton-content"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-item" style="opacity: 0.5;"><div class="skeleton-avatar"></div><div class="skeleton-content"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-item" style="opacity: 0.3;"><div class="skeleton-avatar"></div><div class="skeleton-content"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        </div>
        
        <div class="sidebar-settings" style="padding: 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
            <span style="font-size: 12px; color: var(--text-muted); font-weight: 500;">Wygląd</span>
            <button onclick="document.body.classList.toggle('light-theme')" style="background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px;" title="Przełącz motyw (Light/Dark)">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- Chat Area -->
    <main class="chat-area">
        
        <!-- Header: Conversation info or New Message Input -->
        <div class="chat-header hidden" id="chatHeader">
            <div class="avatar" id="chatHeaderAvatar" style="background-color: var(--accent);">#</div>
            <div class="chat-header-info">
                <h2 id="chatHeaderName">Kontakt</h2>
                <p id="chatHeaderSub">iMessage / SMS</p>
            </div>
        </div>

        <div class="chat-header hidden" id="newMsgHeader" style="padding: 16px 24px;">
            <div style="display: flex; align-items: center; gap: 12px; width: 100%;">
                <span style="color: var(--text-muted); font-weight: 500;">Do:</span>
                <input type="text" id="newMsgNumber" class="compose-input" style="padding: 0; background: transparent; border: none; font-size: 16px;" placeholder="Wpisz numer telefonu...">
            </div>
        </div>

        <!-- Chat History -->
        <div class="chat-history" id="chatHistory">
            <div class="empty-state" id="emptyState">
                <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
                </svg>
                <h3>Twój iPhone na Linuksie</h3>
                <p style="font-size: 13px; max-width: 250px; margin: 0 auto;">Wybierz konwersację z paska bocznego lub rozpocznij nową, aby wysłać SMS.</p>
            </div>
        </div>
        
        <!-- Compose Area -->
        <div class="compose-area">
            <div class="compose-input-wrapper">
                <textarea class="compose-input" id="messageInput" placeholder="Wiadomość..." disabled rows="1"></textarea>
                <div id="charCounter" class="char-counter hidden">0/160</div>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-left: -2px; margin-top: 2px;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </main>

    <script>
        let currentActiveNumber = null;
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove());
            }, 6000); // Zwiększono czas do 6 sekund
        }

        // Setup textarea auto-resize and counter
        const messageInput = document.getElementById("messageInput");
        const charCounter = document.getElementById("charCounter");
        
        messageInput.addEventListener("input", function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value === '') this.style.height = 'auto';
            
            const len = this.value.length;
            if (len > 0) {
                charCounter.classList.remove('hidden');
                charCounter.innerText = `${len}/160`;
                if (len > 150) charCounter.classList.add('danger');
                else charCounter.classList.remove('danger');
                
                if (len > 130 && len <= 150) charCounter.classList.add('warning');
                else charCounter.classList.remove('warning');
            } else {
                charCounter.classList.add('hidden');
            }
        });

        // Listen for Enter key to send (Shift+Enter for new line)
        messageInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                document.getElementById("sendBtn").click();
            }
        });

        function getInitials(name) {
            if (!name) return "?";
            name = name.trim();
            if (/^[\d\+]+$/.test(name.replace(/[\s\-\(\)]/g, ''))) return "#";
            
            const parts = name.split(/[\s_-]+/);
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return name.substring(0, 2).toUpperCase();
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.message-item');
            
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                if (text.includes(term)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        function formatTimestamp(ts) {
            if (!ts || ts.length < 15) return "";
            const hh = ts.substring(9, 11);
            const mm = ts.substring(11, 13);
            return `${hh}:${mm}`;
        }

        function getAvatarColor(idStr) {
            if (!idStr) return 'var(--accent)';
            const colors = ['#8b5cf6', '#10b981', '#f59e0b', '#ec4899', '#06b6d4', '#ef4444', '#3b82f6', '#6366f1'];
            let hash = 0;
            for (let i = 0; i < idStr.length; i++) hash = idStr.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        async function fetchMessages() {
            const refreshIcon = document.getElementById('refreshIcon');
            if (refreshIcon) refreshIcon.classList.add('spin');
            
            try {
                const response = await fetch('/api/messages');
                const data = await response.json();
                
                const inboxList = document.getElementById('inboxList');
                inboxList.innerHTML = '';
                
                if (data.error) {
                    document.getElementById('statusBadge').innerHTML = "Błąd Połączenia";
                    document.getElementById('statusBadge').style.background = "rgba(244, 63, 94, 0.1)";
                    document.getElementById('statusBadge').style.color = "var(--accent-warm)";
                    document.getElementById('statusBadge').style.borderColor = "rgba(244, 63, 94, 0.2)";
                    
                    inboxList.innerHTML = `<div style="padding: 24px; color: var(--text-muted); font-size: 13px; text-align: center;">Brak wiadomości</div>`;
                    showToast(data.error, 'error');
                    return;
                }

                // Grouping logic
                const conversations = {};
                
                data.messages.forEach((msg) => {
                    const sender = msg.sender_name || msg.sender || "Nieznany";
                    if (!conversations[sender]) {
                        conversations[sender] = {
                            id: msg.sender || sender,
                            name: sender,
                            messages: [],
                            latestTime: msg.timestamp || ""
                        };
                    }
                    conversations[sender].messages.push(msg);
                    if (msg.status === 'unread') conversations[sender].unread = true;
                    if (msg.timestamp && msg.timestamp > conversations[sender].latestTime) {
                        conversations[sender].latestTime = msg.timestamp;
                    }
                });
                
                const convList = Object.values(conversations).sort((a, b) => b.latestTime.localeCompare(a.latestTime));
                
                convList.forEach((conv, index) => {
                    // Sort messages chronologically for chat history
                    conv.messages.sort((a, b) => (a.timestamp || "").localeCompare(b.timestamp || ""));
                    
                    const latestMsg = conv.messages[conv.messages.length - 1];
                    const timeStr = formatTimestamp(latestMsg.timestamp);
                    
                    const item = document.createElement('div');
                    item.className = 'message-item';
                    if (conv.unread) item.classList.add('unread');
                    item.style.animationDelay = `${index * 0.05}s`;
                    item.style.animation = 'popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                    item.style.opacity = '0';
                    
                    const initials = getInitials(conv.name);
                    const color = getAvatarColor(conv.id);
                    
                    item.innerHTML = `
                        <div class="avatar" style="background-color: ${color};">${initials}</div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-sender">${conv.name}</span>
                                <span class="message-time">${timeStr}</span>
                            </div>
                            <div class="message-subject">${latestMsg.subject}</div>
                        </div>
                    `;
                    
                    item.onclick = () => {
                        document.querySelectorAll('.message-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        selectConversation(conv);
                    };
                    inboxList.appendChild(item);
                });
                
            } catch (error) {
                console.error("Error fetching messages:", error);
                showToast("Błąd komunikacji z serwerem.", "error");
            } finally {
                if (refreshIcon) refreshIcon.classList.remove('spin');
            }
        }
        
        function selectConversation(conv) {
            currentActiveNumber = conv.id;
            
            document.getElementById('newMsgHeader').classList.add('hidden');
            document.getElementById('chatHeader').classList.remove('hidden');
            document.getElementById('chatHeaderName').innerText = conv.name;
            
            const avatar = document.getElementById('chatHeaderAvatar');
            avatar.innerText = getInitials(conv.name);
            avatar.style.backgroundColor = getAvatarColor(conv.id);
            
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML = '';
            
            conv.messages.forEach(msg => {
                const bubble = document.createElement('div');
                // MAP fetch is only inbox for now, so assume received
                bubble.className = 'chat-bubble received';
                bubble.innerText = msg.subject;
                chatHistory.appendChild(bubble);
            });
            
            enableCompose();
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
        
        function startNewMessage() {
            currentActiveNumber = null;
            
            document.querySelectorAll('.message-item').forEach(el => el.classList.remove('active'));
            document.getElementById('chatHeader').classList.add('hidden');
            document.getElementById('newMsgHeader').classList.remove('hidden');
            document.getElementById('newMsgNumber').value = '';
            
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML = `
                <div class="empty-state" style="margin-top: 40px;">
                    <p style="font-size: 14px;">Zacznij nową konwersację wpisując numer na górze.</p>
                </div>`;
            
            enableCompose();
            document.getElementById('newMsgNumber').focus();
        }
        
        function enableCompose() {
            const input = document.getElementById('messageInput');
            input.disabled = false;
            document.getElementById('sendBtn').disabled = false;
            input.placeholder = "Wiadomość...";
            input.focus();
        }

        async function sendMessage() {
            let targetNumber = currentActiveNumber;
            
            if (!document.getElementById('newMsgHeader').classList.contains('hidden')) {
                targetNumber = document.getElementById('newMsgNumber').value.trim();
                if (!targetNumber) {
                    alert("Wpisz numer telefonu!");
                    return;
                }
            }
            
            if (!targetNumber) return;
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const chatHistory = document.getElementById('chatHistory');
            const emptyState = chatHistory.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            // Add sent bubble
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble sent';
            const spanText = document.createElement('span');
            spanText.innerText = text;
            bubble.appendChild(spanText);
            
            const statusTick = document.createElement('div');
            statusTick.className = 'status-tick';
            statusTick.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>`;
            bubble.appendChild(statusTick);
            
            chatHistory.appendChild(bubble);
            
            input.value = '';
            input.style.height = 'auto';
            input.disabled = true;
            charCounter.classList.add('hidden');
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            const originalBtnContent = sendBtn.innerHTML;
            sendBtn.innerHTML = '<div class="btn-loader"></div>';
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: targetNumber, text: text })
                });
                
                const result = await response.json();
                
                input.disabled = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = originalBtnContent;
                input.focus();
                
                if (result.error) {
                    showToast(result.error, 'error');
                    bubble.style.opacity = '0.5';
                    bubble.title = 'Nie wysłano';
                    statusTick.innerHTML = `<svg width="14" height="14" fill="none" stroke="#f87171" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3Z" /></svg>`;
                } else {
                    statusTick.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>`;
                    if (!document.getElementById('newMsgHeader').classList.contains('hidden')) {
                        currentActiveNumber = targetNumber;
                        document.getElementById('newMsgHeader').classList.add('hidden');
                        document.getElementById('chatHeader').classList.remove('hidden');
                        document.getElementById('chatHeaderName').innerText = targetNumber;
                        
                        // Manually insert conversation at the top of the sidebar
                        const inboxList = document.getElementById('inboxList');
                        document.querySelectorAll('.message-item').forEach(el => el.classList.remove('active'));
                        
                        const item = document.createElement('div');
                        item.className = 'message-item active';
                        item.style.animation = 'popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                        
                        const now = new Date();
                        const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                        
                        const initials = getInitials(targetNumber);
                        const color = getAvatarColor(targetNumber);
                        
                        item.innerHTML = `
                            <div class="avatar" style="background-color: ${color};">${initials}</div>
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="message-sender">${targetNumber}</span>
                                    <span class="message-time">${timeStr}</span>
                                </div>
                                <div class="message-subject">Ty: ${text}</div>
                            </div>
                        `;
                        
                        item.onclick = () => {
                            document.querySelectorAll('.message-item').forEach(el => el.classList.remove('active'));
                            item.classList.add('active');
                            selectConversation({
                                id: targetNumber,
                                name: targetNumber,
                                messages: [{ subject: text }]
                            });
                        };
                        
                        inboxList.insertBefore(item, inboxList.firstChild);
                    } else {
                        // Update the last message in the sidebar for an existing conversation
                        const activeItem = document.querySelector('.message-item.active .message-subject');
                        if (activeItem) {
                            activeItem.innerText = `Ty: ${text}`;
                        }
                    }
                }
            } catch (err) {
                input.disabled = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = originalBtnContent;
                showToast("Błąd wysyłania.", "error");
                bubble.style.opacity = '0.5';
                console.error(err);
            }
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // Initialize
        fetchMessages();
    </script>
</body>
</html>
